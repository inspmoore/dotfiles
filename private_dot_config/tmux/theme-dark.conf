# Dark theme — retro-wave inspired
# Based on Zellij's retro-wave palette

# Colors
# bg:      #16161e (dark navy)
# fg:      #b4a5ff (lavender)
# black:   #16161e
# red:     #ff5ea0
# green:   #26bfa5
# yellow:  #f5c76a
# blue:    #5b7dff
# magenta: #a78bfa
# cyan:    #5de4c7
# white:   #b4a5ff
# orange:  #ff9e64

# Status bar
set -g status-style "bg=#1a1b26,fg=#b4a5ff"
set -g status-left-length 40
set -g status-right-length 120

# Mode indicator (dark palette)
set -g status-left "#{?#{==:#{@mode},LOCKED},#[bg=#26bfa5 fg=#16161e bold],#{?#{==:#{@mode},NORMAL},#[bg=#f5c76a fg=#16161e bold],#{?#{==:#{@mode},PANE},#[bg=#5b7dff fg=#b4a5ff bold],#{?#{==:#{@mode},TAB},#[bg=#a78bfa fg=#16161e bold],#{?#{==:#{@mode},RESIZE},#[bg=#ff5ea0 fg=#16161e bold],#{?#{==:#{@mode},MOVE},#[bg=#ff9e64 fg=#16161e bold],#{?#{==:#{@mode},SCROLL},#[bg=#5de4c7 fg=#16161e bold],#{?#{==:#{@mode},SESSION},#[bg=#ff5ea0 fg=#16161e bold],#[bg=default fg=default]}}}}}}}} #{@mode} #[default] "
set -g status-right "#[fg=#5b7dff] #S #[fg=#3b3d57]|#[fg=#b4a5ff] #{pane_current_path} #[fg=#3b3d57]|#[fg=#b4a5ff] %H:%M "

# Pane borders
set -g pane-border-style "fg=#3b3d57"
set -g pane-active-border-style "fg=#a78bfa"

# Window status
set -g window-status-style "fg=#5b7dff"
set -g window-status-current-style "fg=#1a1b26,bg=#a78bfa,bold"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "

# Message style
set -g message-style "bg=#a78bfa,fg=#16161e"
set -g message-command-style "bg=#5b7dff,fg=#16161e"

# Mode style (copy mode highlight etc.)
set -g mode-style "bg=#a78bfa,fg=#16161e"

# Clock
set -g clock-mode-colour "#a78bfa"
