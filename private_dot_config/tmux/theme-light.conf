# Light theme — catppuccin-latte inspired

# Colors
# bg:      #eff1f5 (base)
# fg:      #4c4f69 (text)
# surface: #ccd0da
# overlay: #9ca0b0
# red:     #d20f39
# green:   #40a02b
# yellow:  #df8e1d
# blue:    #1e66f5
# magenta: #8839ef (mauve)
# cyan:    #179299 (teal)
# pink:    #ea76cb

# Pane background (match Ghostty catppuccin-latte theme)
set -g window-style "bg=#eff1f5,fg=#4c4f69"
set -g window-active-style "bg=#eff1f5,fg=#4c4f69"

# Status bar
set -g status-style "bg=#ccd0da,fg=#4c4f69"
set -g status-left-length 40
set -g status-right-length 120

# Mode indicator (light palette)
set -g status-left "#{?#{==:#{@mode},LOCKED},#[bg=#40a02b fg=#eff1f5 bold],#{?#{==:#{@mode},NORMAL},#[bg=#df8e1d fg=#eff1f5 bold],#{?#{==:#{@mode},PANE},#[bg=#1e66f5 fg=#eff1f5 bold],#{?#{==:#{@mode},TAB},#[bg=#8839ef fg=#eff1f5 bold],#{?#{==:#{@mode},RESIZE},#[bg=#d20f39 fg=#eff1f5 bold],#{?#{==:#{@mode},MOVE},#[bg=#df8e1d fg=#eff1f5 bold],#{?#{==:#{@mode},SCROLL},#[bg=#179299 fg=#eff1f5 bold],#{?#{==:#{@mode},SESSION},#[bg=#d20f39 fg=#eff1f5 bold],#[bg=default fg=default]}}}}}}}} #{@mode} #[default] "
set -g status-right "#[fg=#1e66f5] #S #[fg=#9ca0b0]|#[fg=#4c4f69] #{pane_current_path} #[fg=#9ca0b0]|#[fg=#4c4f69] %H:%M "

# Pane borders
set -g pane-border-style "fg=#ccd0da"
set -g pane-active-border-style "fg=#8839ef"

# Window status
set -g window-status-style "fg=#6c6f85"
set -g window-status-current-style "fg=#eff1f5,bg=#8839ef,bold"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "

# Message style
set -g message-style "bg=#8839ef,fg=#eff1f5"
set -g message-command-style "bg=#1e66f5,fg=#eff1f5"

# Mode style
set -g mode-style "bg=#8839ef,fg=#eff1f5"

# Clock
set -g clock-mode-colour "#8839ef"
