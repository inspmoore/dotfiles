# =============================================================================
# tmux.conf — Zellij-like modal keybindings
# =============================================================================
# Modal system:
#   root table     = "locked" (keys pass through, only Ctrl+a activates)
#   normal table   = Zellij normal mode (sub-mode entry + common bindings)
#   pane/tab/resize/move/scroll/session = sub-mode tables
#
# Flow: root --Ctrl+a--> normal --Esc--> root
#       normal --p/t/r/m/s/o--> sub-mode --Esc--> root

# ---------------------------------------------------------------------------
# General settings
# ---------------------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -s escape-time 0
set -g renumber-windows on
set -g history-limit 50000
set -g focus-events on
set -g set-clipboard on
set -g mode-keys vi
set -gq allow-passthrough on
set -g visual-activity off
set-option -g focus-events on
set -g pane-border-lines heavy
set -g pane-border-indicators arrows

# Unbind all prefix defaults — we use key tables instead of prefix
unbind -a -T prefix

# Disable prefix entirely — we use key tables instead
set -g prefix None

# ---------------------------------------------------------------------------
# Mode indicator in status bar
# ---------------------------------------------------------------------------
# We use a status-left that shows the current mode.
# Each key table switch updates a user option @mode, then refreshes the client.

set -g status-interval 1
set -g status-position top

# Default mode indicator (locked)
set -g @mode "LOCKED"

# Status bar format is set by theme files (theme-dark.conf / theme-light.conf)
# including mode indicator colors and status-right styling

# ---------------------------------------------------------------------------
# Helper: switch to mode macro
# ---------------------------------------------------------------------------
# Each mode-switch binding:
#   1. Sets @mode to the mode name
#   2. Switches to the key table
#   3. Refreshes the status bar

# Hook: restore normal mode after float popup reopens from resize
# When the float script sets FLOAT_RESTORE_NORMAL=1 before detach/reopen,
# this hook detects re-entry into the float session and switches to normal mode.
set-hook -g client-session-changed 'if-shell "case \"#{session_name}\" in float-*) tmux showenv -g FLOAT_RESTORE_NORMAL >/dev/null 2>&1 ;; *) false ;; esac" "run-shell \"tmux setenv -gu FLOAT_RESTORE_NORMAL\" ; set -g @mode NORMAL ; switch-client -T normal" ""'

# ---------------------------------------------------------------------------
# ROOT TABLE (locked mode) — only Ctrl+a and vim-tmux-navigator
# ---------------------------------------------------------------------------
bind -T root C-a {
    set -g @mode "NORMAL"
    switch-client -T normal
}

# Ctrl+h/j/k/l: vim-aware move-focus-or-tab
# We disable vim-tmux-navigator's own bindings and roll our own that combine
# the vim check with move-focus-or-tab fallback (switch window at edge).
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?$'"
is_float="case '#{session_name}' in float-*) true ;; *) false ;; esac"
bind -T root C-h if-shell "$is_float" "run-shell '$HOME/.config/tmux/float.sh nav-left'" "if-shell \"$is_vim\" 'send-keys C-h' \"run-shell '$HOME/.config/tmux/move-focus-or-tab.sh left'\""
bind -T root C-j if-shell "$is_float" "send-keys C-j" "if-shell \"$is_vim\" 'send-keys C-j' 'select-pane -D'"
bind -T root C-k if-shell "$is_float" "send-keys C-k" "if-shell \"$is_vim\" 'send-keys C-k' 'select-pane -U'"
bind -T root C-l if-shell "$is_float" "run-shell '$HOME/.config/tmux/float.sh nav-right'" "if-shell \"$is_vim\" 'send-keys C-l' \"run-shell '$HOME/.config/tmux/move-focus-or-tab.sh right'\""

# ---------------------------------------------------------------------------
# NORMAL MODE (after Ctrl+a)
# ---------------------------------------------------------------------------
# Sub-mode entry
bind -T normal p {
    set -g @mode "PANE"
    switch-client -T pane
}
bind -T normal t {
    set -g @mode "TAB"
    switch-client -T tab
}
bind -T normal r {
    set -g @mode "RESIZE"
    switch-client -T resize
}
bind -T normal m {
    set -g @mode "MOVE"
    switch-client -T move
}
bind -T normal s {
    set -g @mode "SCROLL"
    copy-mode
    switch-client -T root
}
bind -T normal o {
    set -g @mode "SESSION"
    switch-client -T session
}

# Direct actions in normal mode
bind -T normal h { select-pane -L ; set -g @mode "LOCKED" }
bind -T normal j { select-pane -D ; set -g @mode "LOCKED" }
bind -T normal k { select-pane -U ; set -g @mode "LOCKED" }
bind -T normal l { select-pane -R ; set -g @mode "LOCKED" }

# Toggle floating pane
bind -T normal w {
    set -g @mode "LOCKED"
    run-shell "$HOME/.config/tmux/float.sh toggle #{window_id}"
}

# Close current pane
bind -T normal x {
    kill-pane
    set -g @mode "LOCKED"
}

# Go to window N
bind -T normal 1 { select-window -t :1 ; set -g @mode "LOCKED" }
bind -T normal 2 { select-window -t :2 ; set -g @mode "LOCKED" }
bind -T normal 3 { select-window -t :3 ; set -g @mode "LOCKED" }
bind -T normal 4 { select-window -t :4 ; set -g @mode "LOCKED" }
bind -T normal 5 { select-window -t :5 ; set -g @mode "LOCKED" }
bind -T normal 6 { select-window -t :6 ; set -g @mode "LOCKED" }
bind -T normal 7 { select-window -t :7 ; set -g @mode "LOCKED" }
bind -T normal 8 { select-window -t :8 ; set -g @mode "LOCKED" }
bind -T normal 9 { select-window -t :9 ; set -g @mode "LOCKED" }

# Quick resize (uniform increase/decrease, stays in normal mode)
# In float session: resize the popup. Otherwise: resize the pane.
FLOAT_SH="$HOME/.config/tmux/float.sh"
bind -T normal + if-shell "case '#{session_name}' in float-*) true ;; *) false ;; esac" "run-shell '$FLOAT_SH resize-out'" "resize-pane -U 2 ; resize-pane -R 4 ; switch-client -T normal"
bind -T normal - if-shell "case '#{session_name}' in float-*) true ;; *) false ;; esac" "run-shell '$FLOAT_SH resize-in'" "resize-pane -D 2 ; resize-pane -L 4 ; switch-client -T normal"
bind -T normal = if-shell "case '#{session_name}' in float-*) true ;; *) false ;; esac" "run-shell '$FLOAT_SH resize-out'" "resize-pane -U 2 ; resize-pane -R 4 ; switch-client -T normal"

# Quit/kill session
bind -T normal Q kill-session

# Clear pane
bind -T normal X send-keys C-l

# Return to locked
bind -T normal Escape { set -g @mode "LOCKED" }
bind -T normal Enter  { set -g @mode "LOCKED" }
# Swallow unbound keys — stay in normal mode
bind -T normal Any switch-client -T normal

# ---------------------------------------------------------------------------
# PANE MODE (after Ctrl+a, p)
# ---------------------------------------------------------------------------
bind -T pane h { select-pane -L }
bind -T pane j { select-pane -D }
bind -T pane k { select-pane -U }
bind -T pane l { select-pane -R }

# New pane (default split — side by side) — disabled in float
bind -T pane n if-shell "$is_float" "switch-client -T pane" "split-window -h ; set -g @mode LOCKED"
# New pane right (vertical split) — disabled in float
bind -T pane r if-shell "$is_float" "switch-client -T pane" "split-window -h ; set -g @mode LOCKED"
# New pane down — disabled in float
bind -T pane d if-shell "$is_float" "switch-client -T pane" "split-window -v ; set -g @mode LOCKED"
# Toggle fullscreen (zoom)
bind -T pane f { resize-pane -Z ; set -g @mode "LOCKED" }
# Toggle floating
bind -T pane w {
    set -g @mode "LOCKED"
    run-shell "$HOME/.config/tmux/float.sh toggle #{window_id}"
}
# Close pane
bind -T pane x { kill-pane ; set -g @mode "LOCKED" }
# Rename pane (sets pane title)
bind -T pane c { command-prompt -p "Pane name:" "select-pane -T '%%'" ; set -g @mode "LOCKED" }
# Toggle pane frames (border visibility)
bind -T pane z { set -g pane-border-status off ; set -g @mode "LOCKED" }

# Tab key cycles focus
bind -T pane Tab { select-pane -t :.+ }

# Escape to locked
bind -T pane Escape { set -g @mode "LOCKED" }
bind -T pane Any switch-client -T pane

# Also bind sub-mode entry keys so you can switch directly
bind -T pane p { set -g @mode "NORMAL" ; switch-client -T normal }
bind -T pane t { set -g @mode "TAB" ; switch-client -T tab }

# ---------------------------------------------------------------------------
# TAB MODE (after Ctrl+a, t)
# ---------------------------------------------------------------------------
bind -T tab h previous-window
bind -T tab l next-window
bind -T tab j next-window
bind -T tab k previous-window

# New tab (window) — disabled in float
bind -T tab n if-shell "$is_float" "switch-client -T tab" "new-window ; set -g @mode LOCKED"
# Rename tab
bind -T tab r { command-prompt -I "#W" "rename-window '%%'" ; set -g @mode "LOCKED" }
# Close tab
bind -T tab x { kill-window ; set -g @mode "LOCKED" }

# Go to tab N
bind -T tab 1 { select-window -t :1 ; set -g @mode "LOCKED" }
bind -T tab 2 { select-window -t :2 ; set -g @mode "LOCKED" }
bind -T tab 3 { select-window -t :3 ; set -g @mode "LOCKED" }
bind -T tab 4 { select-window -t :4 ; set -g @mode "LOCKED" }
bind -T tab 5 { select-window -t :5 ; set -g @mode "LOCKED" }
bind -T tab 6 { select-window -t :6 ; set -g @mode "LOCKED" }
bind -T tab 7 { select-window -t :7 ; set -g @mode "LOCKED" }
bind -T tab 8 { select-window -t :8 ; set -g @mode "LOCKED" }
bind -T tab 9 { select-window -t :9 ; set -g @mode "LOCKED" }

# Break pane to new tab — disabled in float
bind -T tab b if-shell "$is_float" "switch-client -T tab" "break-pane ; set -g @mode LOCKED"
# Move tab left/right
bind -T tab H { swap-window -t -1 ; select-window -t -1 }
bind -T tab L { swap-window -t +1 ; select-window -t +1 }
# Toggle last tab
bind -T tab Tab last-window

# Escape to locked
bind -T tab Escape { set -g @mode "LOCKED" }
bind -T tab t { set -g @mode "NORMAL" ; switch-client -T normal }
bind -T tab Any switch-client -T tab

# ---------------------------------------------------------------------------
# RESIZE MODE (after Ctrl+a, r)
# ---------------------------------------------------------------------------
# Increase in direction
bind -T resize h { resize-pane -L 2 ; switch-client -T resize }
bind -T resize j { resize-pane -D 2 ; switch-client -T resize }
bind -T resize k { resize-pane -U 2 ; switch-client -T resize }
bind -T resize l { resize-pane -R 2 ; switch-client -T resize }

# Decrease (opposite direction)
bind -T resize H { resize-pane -R 2 ; switch-client -T resize }
bind -T resize J { resize-pane -U 2 ; switch-client -T resize }
bind -T resize K { resize-pane -D 2 ; switch-client -T resize }
bind -T resize L { resize-pane -L 2 ; switch-client -T resize }

# General resize (uniform)
bind -T resize + { resize-pane -U 2 ; resize-pane -R 4 ; switch-client -T resize }
bind -T resize - { resize-pane -D 2 ; resize-pane -L 4 ; switch-client -T resize }
bind -T resize = { resize-pane -U 2 ; resize-pane -R 4 ; switch-client -T resize }

# Escape to locked
bind -T resize Escape { set -g @mode "LOCKED" }
bind -T resize r { set -g @mode "NORMAL" ; switch-client -T normal }
bind -T resize Any switch-client -T resize

# ---------------------------------------------------------------------------
# MOVE MODE (after Ctrl+a, m)
# ---------------------------------------------------------------------------
bind -T move h { swap-pane -s '{left-of}' ; switch-client -T move }
bind -T move j { swap-pane -D ; switch-client -T move }
bind -T move k { swap-pane -U ; switch-client -T move }
bind -T move l { swap-pane -s '{right-of}' ; switch-client -T move }

# Move tab
bind -T move H { swap-window -t -1 ; select-window -t -1 ; switch-client -T move }
bind -T move L { swap-window -t +1 ; select-window -t +1 ; switch-client -T move }

# Cycle pane position
bind -T move n { swap-pane -D ; switch-client -T move }
bind -T move p { swap-pane -U ; switch-client -T move }
bind -T move Tab { swap-pane -D ; switch-client -T move }

# Escape to locked
bind -T move Escape { set -g @mode "LOCKED" }
bind -T move m { set -g @mode "NORMAL" ; switch-client -T normal }
bind -T move Any switch-client -T move

# ---------------------------------------------------------------------------
# SESSION MODE (after Ctrl+a, o)
# ---------------------------------------------------------------------------
bind -T session d detach-client
bind -T session w { choose-tree -s ; set -g @mode "LOCKED" }
bind -T session Escape { set -g @mode "LOCKED" }
bind -T session o { set -g @mode "NORMAL" ; switch-client -T normal }
bind -T session Any switch-client -T session

# ---------------------------------------------------------------------------
# SCROLL/COPY MODE
# ---------------------------------------------------------------------------
# Scroll mode enters tmux copy-mode directly (bound in normal mode above).
# copy-mode-vi keybindings are built-in. Additional customizations:
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel

# ---------------------------------------------------------------------------
# Plugins (TPM)
# ---------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
# Disable vim-tmux-navigator default bindings — we set our own in root table
set -g @vim_navigator_mapping_left 'None'
set -g @vim_navigator_mapping_down 'None'
set -g @vim_navigator_mapping_up 'None'
set -g @vim_navigator_mapping_right 'None'
set -g @vim_navigator_mapping_prev 'None'
set -g @vim_navigator_prefix_mapping_clear_screen 'None'
set -g @plugin 'erikw/tmux-dark-notify'

# Dark/light theme auto-switching
set -g @dark-notify-theme-path-light '~/.config/tmux/theme-light.conf'
set -g @dark-notify-theme-path-dark '~/.config/tmux/theme-dark.conf'

# Load default theme (dark) — will be overridden by dark-notify on startup
source-file ~/.config/tmux/theme-dark.conf

# ---------------------------------------------------------------------------
# Initialize TPM (keep this at the very bottom)
# ---------------------------------------------------------------------------
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins/'
run '~/.config/tmux/plugins/tpm/tpm'

# Start dark-notify runner explicitly (TPM's run-shell kills backgrounded processes)
run-shell -b '~/.config/tmux/plugins/tmux-dark-notify/scripts/tmux-dark-notify-runner.sh'
